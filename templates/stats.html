<!DOCTYPE html>
<html>
<head>
    <title>Compression Statistics</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="container mt-5">

    <h1 class="mb-4">
        Compression Analytics
    </h1>

    <div class="row">

        <div class="col-md-4">
            <div class="card p-4">
                <h3>Total Operations</h3>
                <h2>{{ stats.operations }}</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-4">
                <h3>Average Ratio</h3>
                <h2>{{ stats.avg_ratio }}%</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-4">
                <h3>Bytes Saved</h3>
                <h2>{{ stats.total_saved }}</h2>
            </div>
        </div>

    </div>

</body>
</html>
